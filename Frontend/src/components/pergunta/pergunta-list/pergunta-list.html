<p-table [value]="values" >
    <ng-template #header>
        <tr>
            <th>Identificador</th>
            <th>Pergunta</th>
        </tr>
    </ng-template>
    <ng-template #body let-product > 
        <tr class="cursor-pointer" (click)="onSelect(product.id)">
            <td>{{ product.identificador }}</td>
            <td>{{ product.texto }}</td>
        </tr>
    </ng-template>
</p-table>
